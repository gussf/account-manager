services:
  db:
    image: postgres:18.3
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: account-manager
    ports:
      - "5432:5432"
  account-manager:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_HOSTNAME: db
      HTTP_SERVER_PORT: 8081
    container_name: account-manager
    depends_on:
      - db
    ports:
      - "8081:8081"

